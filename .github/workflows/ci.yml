name: CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - src/**
      - tests/**
      pull_request:
        branches:
          - main
      types: 
        - opened
        - synchronize
        - reopened
      paths:
        - src/**
        - tests/**
        
        
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: always()
    steps:
      - name: Print results
        run: |
          echo "Lint:  ${{ needs.lint.result }}"
          echo "Test:  ${{ needs.test.result }}"
